                required: false
                fields:
                  - { label: "탭 ID", name: "id", widget: "string" }
                  - { label: "탭 라벨", name: "label", widget: "string" }
                  - { label: "탭 타입", name: "type", widget: "select", options: ["text","image","galleryFeed","nestedTabs"], required: false }
                  - { label: "탭 본문", name: "body", widget: "markdown", required: false }
                  - { label: "이미지", name: "image", widget: "image", required: false }
                  - { label: "이미지 대체텍스트", name: "imageAlt", widget: "text", required: false }
                  - { label: "이미지 스타일", name: "imageStyle", widget: "string", required: false }
                  - { label: "태그", name: "tag", widget: "string", required: false }
                  - { label: "표시 개수", name: "limit", widget: "number", required: false }

                  - label: "하위 탭"
                    name: "tabs"
                    widget: "list"
                    required: false
                    fields:
                      - { label: "하위 탭 ID", name: "id", widget: "string" }
                      - { label: "하위 탭 라벨", name: "label", widget: "string" }
                      - { label: "하위 탭 본문", name: "body", widget: "markdown", required: false }

              - { label: "태그", name: "tag", widget: "string", required: false }
              - { label: "표시 개수", name: "limit", widget: "number", required: false }
