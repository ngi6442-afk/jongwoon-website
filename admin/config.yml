backend:
  name: github
  repo: ngi6442-afk/jongwoon-website   # 실제 레포 경로 확인
  branch: main
  auth_scope: repo
  open_authoring: false
  commit_messages:
    create: "📸 새 갤러리 등록: {{slug}}"
    update: "✏️ 갤러리 수정: {{slug}}"
    delete: "🗑️ 갤러리 삭제: {{slug}}"

media_folder: "img/gallery"
public_folder: "/img/gallery"

collections:
  - name: "gallery"
    label: "현장 갤러리"
    format: "json"
    files:
      - label: "현장 갤러리 목록"
        name: "gallery_list"
        file: "data/gallery.json"
        fields:
          - label: "항목"
            name: "items"
            widget: "list"
            collapsed: true
            fields:
              - { label: "제목",  name: "title", widget: "string" }
              - { label: "날짜",  name: "date",  widget: "datetime", format: "YYYY-MM-DD" }
              - { label: "태그",  name: "tag",   widget: "select", options: ["폐기물","준설","CCTV","건설","석면","재활용"] }
              - { label: "설명",  name: "description", widget: "text", required: false }
              - { label: "대표 이미지(단일/선택)", name: "image", widget: "image", required: false }
              - label: "이미지(다중)"
                name: "images"
                widget: "list"
                allow_add: true
                collapsed: false
                summary: "{{fields.src}}"
                fields:
                  - { label: "파일", name: "src", widget: "image" }
                  - { label: "캡션", name: "caption", widget: "string", required: false }

  - name: "faq"
    label: "자주 묻는 질문 (FAQ)"
    format: "json"
    files:
      - label: "FAQ 목록"
        name: "faq_list"
        file: "data/faq.json"
        fields:
          - label: "FAQ 항목"
            name: "items"
            widget: "list"
            collapsed: true
            fields:
              - { label: "카테고리", name: "category", widget: "select", options: ["일반","폐기물","준설","건설","석면"] }
              - { label: "질문", name: "question", widget: "string" }
              - { label: "답변", name: "answer", widget: "text" }

  - name: "fleet"
    label: "운반차량 현황"
    format: "json"
    files:
      - label: "운반차량 목록"
        name: "fleet_list"
        file: "data/fleet.json"
        fields:
          - label: "차량 항목"
            name: "items"
            widget: "list"
            collapsed: true
            fields:
              - { label: "분류", name: "category", widget: "string", required: false }
              - { label: "차량명", name: "title", widget: "string" }
              - { label: "주요 사양", name: "spec", widget: "string", required: false }
              - { label: "보유 수량", name: "quantity", widget: "string", required: false }
              - { label: "설명", name: "description", widget: "text", required: false }
              - { label: "이미지", name: "image", widget: "image", required: false }
              - { label: "정렬 순서", name: "order", widget: "number", required: false }

  - name: "pages_core"
    label: "페이지 관리"
    format: "json"
    files:
      - label: "운반차량 페이지"
        name: "fleet_page"
        file: "data/pages/fleet.json"
        fields:
          - { label: "슬러그", name: "slug", widget: "hidden", default: "fleet" }
          - { label: "템플릿", name: "template", widget: "hidden", default: "page-standard" }
          - label: "메타"
            name: "meta"
            widget: "object"
            fields:
              - { label: "페이지 제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text", required: false }
          - label: "히어로"
            name: "hero"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "부제", name: "subtitle", widget: "string", required: false }
              - { label: "노출 여부", name: "visible", widget: "boolean", default: true }
          - label: "브레드크럼"
            name: "breadcrumbs"
            widget: "list"
            fields:
              - { label: "라벨", name: "label", widget: "string" }
              - { label: "링크", name: "href", widget: "string", required: false }
          - label: "섹션"
            name: "sections"
            widget: "list"
            summary: "{{fields.order}}. {{fields.type}} - {{fields.title}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "타입", name: "type", widget: "select", options: ["legalText","text","tableImage","fleetCards"] }
              - { label: "제목", name: "title", widget: "string", required: false }
              - { label: "본문", name: "body", widget: "markdown", required: false }
              - { label: "이미지", name: "image", widget: "image", required: false }
              - { label: "이미지 대체텍스트", name: "imageAlt", widget: "text", required: false }
              - { label: "목록 항목", name: "items", widget: "list", required: false }
              - { label: "참조 소스", name: "source", widget: "string", required: false }
              - { label: "노출 여부", name: "visible", widget: "boolean", default: true }
              - { label: "정렬 순서", name: "order", widget: "number", default: 1 }

      - label: "기술보유 페이지"
        name: "cert_page"
        file: "data/pages/cert.json"
        fields:
          - { label: "슬러그", name: "slug", widget: "hidden", default: "cert" }
          - { label: "템플릿", name: "template", widget: "hidden", default: "page-standard" }
          - label: "메타"
            name: "meta"
            widget: "object"
            fields:
              - { label: "페이지 제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text", required: false }
          - label: "히어로"
            name: "hero"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "부제", name: "subtitle", widget: "string", required: false }
              - { label: "노출 여부", name: "visible", widget: "boolean", default: true }
          - label: "브레드크럼"
            name: "breadcrumbs"
            widget: "list"
            fields:
              - { label: "라벨", name: "label", widget: "string" }
              - { label: "링크", name: "href", widget: "string", required: false }
          - label: "섹션"
            name: "sections"
            widget: "list"
            summary: "{{fields.order}}. {{fields.type}} - {{fields.title}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "타입", name: "type", widget: "select", options: ["legalText","text","tableImage","certGallery"] }
              - { label: "제목", name: "title", widget: "string", required: false }
              - { label: "본문", name: "body", widget: "markdown", required: false }
              - { label: "이미지", name: "image", widget: "image", required: false }
              - { label: "이미지 대체텍스트", name: "imageAlt", widget: "text", required: false }
              - label: "인증서 항목"
                name: "items"
                widget: "list"
                required: false
                fields:
                  - { label: "인증서명", name: "name", widget: "string" }
                  - { label: "날짜", name: "date", widget: "string", required: false }
                  - { label: "이미지", name: "image", widget: "image" }
                  - { label: "대체텍스트", name: "alt", widget: "string", required: false }
              - { label: "노출 여부", name: "visible", widget: "boolean", default: true }
              - { label: "정렬 순서", name: "order", widget: "number", default: 1 }

      - label: "대표 인사말 페이지"
        name: "greeting_page"
        file: "data/pages/greeting.json"
        fields:
          - { label: "슬러그", name: "slug", widget: "hidden", default: "greeting" }
          - { label: "템플릿", name: "template", widget: "hidden", default: "page-standard" }
          - label: "메타"
            name: "meta"
            widget: "object"
            fields:
              - { label: "페이지 제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text", required: false }
          - label: "히어로"
            name: "hero"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "부제", name: "subtitle", widget: "string", required: false }
              - { label: "노출 여부", name: "visible", widget: "boolean", default: true }
          - label: "브레드크럼"
            name: "breadcrumbs"
            widget: "list"
            fields:
              - { label: "라벨", name: "label", widget: "string" }
              - { label: "링크", name: "href", widget: "string", required: false }
          - label: "섹션"
            name: "sections"
            widget: "list"
            summary: "{{fields.order}}. {{fields.type}} - {{fields.title}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "타입", name: "type", widget: "select", options: ["legalText","text","tableImage","signature"] }
              - { label: "제목", name: "title", widget: "string", required: false }
              - { label: "본문", name: "body", widget: "markdown", required: false }
              - { label: "이미지", name: "image", widget: "image", required: false }
              - { label: "이미지 대체텍스트", name: "imageAlt", widget: "text", required: false }
              - { label: "노출 여부", name: "visible", widget: "boolean", default: true }
              - { label: "정렬 순서", name: "order", widget: "number", default: 1 }

      - label: "오시는 길 페이지"
        name: "location_page"
        file: "data/pages/location.json"
        fields:
          - { label: "슬러그", name: "slug", widget: "hidden", default: "location" }
          - { label: "템플릿", name: "template", widget: "hidden", default: "page-standard" }
          - label: "메타"
            name: "meta"
            widget: "object"
            fields:
              - { label: "페이지 제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text", required: false }
          - label: "히어로"
            name: "hero"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "부제", name: "subtitle", widget: "string", required: false }
              - { label: "노출 여부", name: "visible", widget: "boolean", default: true }
          - label: "브레드크럼"
            name: "breadcrumbs"
            widget: "list"
            fields:
              - { label: "라벨", name: "label", widget: "string" }
              - { label: "링크", name: "href", widget: "string", required: false }
          - label: "섹션"
            name: "sections"
            widget: "list"
            summary: "{{fields.order}}. {{fields.type}} - {{fields.title}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "타입", name: "type", widget: "select", options: ["legalText","text","mapInfo"] }
              - { label: "제목", name: "title", widget: "string", required: false }
              - { label: "본문", name: "body", widget: "markdown", required: false }
              - { label: "주소", name: "address", widget: "string", required: false }
              - { label: "지도 컨테이너 ID", name: "mapContainerId", widget: "string", required: false }
              - label: "버튼"
                name: "buttons"
                widget: "list"
                required: false
                fields:
                  - { label: "문구", name: "label", widget: "string" }
                  - { label: "링크", name: "href", widget: "string" }
                  - { label: "주요 버튼", name: "primary", widget: "boolean", default: false }
              - { label: "노출 여부", name: "visible", widget: "boolean", default: true }
              - { label: "정렬 순서", name: "order", widget: "number", default: 1 }

      - label: "자주 묻는 질문 페이지"
        name: "faq_page"
        file: "data/pages/faq.json"
        fields:
          - { label: "슬러그", name: "slug", widget: "hidden", default: "faq" }
          - { label: "템플릿", name: "template", widget: "hidden", default: "page-standard" }
          - label: "메타"
            name: "meta"
            widget: "object"
            fields:
              - { label: "페이지 제목", name: "title", widget: "string" }
